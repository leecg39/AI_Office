<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>완료 항목 · Connect AI Web</title>
    <link rel="stylesheet" href="/styles.css?v=20260607-2">
  </head>
  <body class="completed-page">
    <main class="main completed-main">
      <header class="topbar">
        <div>
          <p class="eyebrow">Completed Work</p>
          <h1>완료 항목</h1>
        </div>
        <div class="topbar-actions">
          <a href="/" class="secondary nav-link">대시보드</a>
        </div>
      </header>

      <section class="completed-layout">
        <aside class="surface completed-list-panel">
          <div class="surface-head">
            <div>
              <div class="section-kicker">Done</div>
              <h2>결과 목록 <span id="completedCount" class="count-badge">0</span></h2>
            </div>
            <div class="completed-list-actions">
              <label class="completed-select-all">
                <input id="completedSelectAll" type="checkbox">
                <span>전체</span>
              </label>
              <button id="deleteSelectedCompleted" type="button" class="secondary small danger-outline" disabled>삭제</button>
            </div>
          </div>
          <div id="completedList" class="completed-list"></div>
        </aside>

        <section id="completedDetail" class="surface completed-detail" aria-live="polite">
          <div class="empty">완료 항목을 불러오는 중입니다.</div>
        </section>
      </section>
    </main>
    <script src="/completed.js?v=20260608-1"></script>
  </body>
</html>
